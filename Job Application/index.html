<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="styles. css" />
</head>

<body>
    <h1>Job Application Page</h1>
    <div class="container">
        <form>
            <label for="name">Full Name: </label>
            <input 
                id="name"
                type="text"
                required
            />
            
            <label for="email">Email Address: </label>
            <input 
                id="email"
                type="email"
                required
            />

            <label for="name">Position: </label>
            <select id="position" name="availability" required>
               <option id="graphic-designer" value="Graphic Designer">Graphic Designer</option> 
                <option id="accountant" value="Accountant">Accountant</option> 
               <option id="security-manager" value="Security Manager">Security Manager</option> 
                
            </select>
            

            <fieldset class="radio-group" required>
                <legend>Availability</legend>
                <input type="radio" name="Time" checked >Part Time</input>
                <input type="radio" name="Time" checked >Full Time</input>
            </fieldset>

            <label for="motivation">Why do you want this job?</label>
            <textarea id="message" name="motivation" rows="5" cols="20" required>Gimme this role because...</textarea>

            <button type="submit">Submit</button>
        </form>

    </div>

</body>
</html>
