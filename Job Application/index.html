<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container">
        <h1>Job Application Form</h1>
        <form>
            <label for="name">Full Name: </label>
            <input id="name" type="text" required />

            <label for="email">Email: </label>
            <input id="email" type="email" required />

            <label for="position">Position: </label>
            <select id="position">
                <option value="ux-designer">UX Designer</option>
                <option value="software-developer">Software Developer</option>
                <option value="cybersecurity-analyst">Cyber Security Analyst</option>
                <option value="frontend-dev">FrontEnd Developer</option>
            </select>

            <hr />

            <fieldset class="radio-group">
                <legend id="availability">Time Availability</legend>

                <input id="part-time" name="availability" type="radio" checked required />
                <label for="part-time">Part Time</label>

                <input id="full-time" name="availability" type="radio" required />
                <label for="full-time">Full Time</label>
            </fieldset>

            <hr />

            <label for="message">Why are you applying for this position?</label>
            <textarea id="message">I am interested in this position because...</textarea>

            <button type="submit">Submit</button>
        </form>
        
    </div>

</body>
</html>
